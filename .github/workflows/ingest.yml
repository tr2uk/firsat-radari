name: Fırsat Radarı — ingest & deploy

# Ücretsiz backend: GitHub Actions cron her gün veriyi çeker,
# public/data.json üretir ve statik siteyi GitHub Pages'e yayınlar. (Vercel yok.)

on:
  schedule:
    - cron: "0 6 * * *"      # her gün 06:00 UTC (belediye verisi için günlük yeterli)
  workflow_dispatch: {}       # elle tetikleme
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıklar
        run: pip install -r scripts/requirements.txt

      - name: Veriyi derle (CANLI)
        env:
          CH_API_KEY: ${{ secrets.CH_API_KEY }}      # Companies House (opsiyonel)
          EPC_API_KEY: ${{ secrets.EPC_API_KEY }}    # EPC (opsiyonel)
        run: |
          python scripts/build_data.py --out public/data.json || \
          python scripts/build_data.py --offline --out public/data.json
          # Canlı çekim başarısızsa offline fixtures ile boş kalmaz.

      - name: E-posta uyarısı (opsiyonel)
        if: ${{ env.RESEND_API_KEY != '' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python scripts/alerts.py

      # Şifreleme deploy'dan ÖNCE ve alerts'ten SONRA (alerts.py düz data.json okur):
      # düz metin public/data.json silinir, yerine AES-256-GCM public/data.enc yüklenir.
      - name: Veriyi şifrele
        env:
          SITE_PASSPHRASE: ${{ secrets.SITE_PASSPHRASE }}
        run: python scripts/encrypt_data.py

      - name: Pages yapılandır
        uses: actions/configure-pages@v5

      - name: Artefaktı yükle (public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Pages'e dağıt
        id: deploy
        uses: actions/deploy-pages@v4
